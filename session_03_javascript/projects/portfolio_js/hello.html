<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hello JavaScript</title>
</head>
<body>
    <h1>Bài tập đầu tiên với JavaScript</h1>
    <p>Mở Console (F12 → Console) để xem kết quả</p>

    <script>
        /*Bài 0.1 - Chào thế giới */
        console.log("BÀI 0.1: CHÀO THẾ GIỚI\n\n");

        console.log("Xin chào thế giới!");
        console.log("Tôi đang học JavaScript");
        console.log(2026);

        /*Bài 0.2 - Khai báo biến*/
        console.log("\nBÀI 0.2: KHAI BÁO BIẾN\n\n");

        let ten = "Minh";
        let tuoi = 20;
        let laSinhVien = true;

        console.log("Tên:", ten);        
        console.log("Tuổi:", tuoi);      
        console.log("Sinh viên:", laSinhVien);

        tuoi = 21;
        console.log("Tuổi mới:", tuoi);  

        const PI = 3.14159;
        const TEN_TRUONG = "Đại học Thủy Lợi";

        console.log("PI =", PI);
        console.log("Trường:", TEN_TRUONG);

        var monHoc = "CSE391";
        console.log("Môn:", monHoc);

        /*Bài 0.3 - Các kiểu dữ liệu*/
        console.log("\nBÀI 0.3: CÁC KIỂU DỮ LIỆU\n\n");

        let hoTen = "Nguyễn Văn A";     
        let diaChi = 'Hà Nội';          
        let loiChao = `Xin chào ${hoTen}`; 

        console.log(typeof hoTen);     
        console.log(loiChao);           

        let soNguyen = 42;
        let soThuc = 3.14;
        let am = -10;
        let voCuc = Infinity;

        console.log(typeof soNguyen);   

        let laTrue = true;
        let laFalse = false;

        console.log(typeof laTrue);     

        let giaTriNull = null;          
        let chuaGanGiaTri;              

        console.log(typeof giaTriNull);   
        console.log(typeof chuaGanGiaTri);

        console.log("42 là:", typeof 42);          
        console.log("'42' là:", typeof "42");      
        console.log("true là:", typeof true);  
        
        /*
            Bài tập con 0.3 — Khai báo biến cho các thông tin và in ra console
        */

        console.log("\nBài tập con 0.3 — Khai báo các biến cho các thông tin và in ra console\n\n");

        let tenMonHoc = "JavaScript";
        let soTinChi = 3;
        let laMonBatBuoc = true;
        let diemSo;

        console.log("\nTên môn học:", tenMonHoc);
        console.log("Số tín chỉ:", soTinChi);
        console.log("Bắt buộc:", laMonBatBuoc);
        console.log("Điểm số:", diemSo);

        /*Bài 0.4 - Template Literal*/
        console.log("\nBÀI 0.4: TEMPLATE LITERAL\n\n");

        let ho = "Nguyễn";
        let Ten = "Minh";
        let Tuoi = 20;
        let diem = 8.5;

        let cau1 = "Tên: " + ho + " " + ten + ", Tuổi: " + tuoi;
        console.log(cau1);

        let cau2 = `Tên: ${ho} ${ten}, Tuổi: ${tuoi}`;
        console.log(cau2);

        let cau3 = `${ho} ${ten} được ${diem} điểm. Năm sau ${ten} sẽ ${tuoi + 1} tuổi.`;
        console.log(cau3);

        let thongBao = `
        === THÔNG TIN SINH VIÊN ===
        Họ tên : ${ho} ${ten}
        Tuổi    : ${tuoi}
        Điểm    : ${diem}
        Xếp loại: ${diem >= 8 ? "Giỏi" : diem >= 6.5 ? "Khá" : "Trung bình"}
        ===========================
        `;
        console.log(thongBao);

        /*
            Bài tập con 0.4: Tạo chuỗi template hiển thị hoá đơn mua hàng
        */
        console.log("\nBài tập con 0.4 - Tạo chuỗi template hiển thị hoá đơn mua hàng\n\n");
        let sanPham = "Laptop";
        let soLuong = 2;
        let donGia = 15000000;

        let hoaDon = `Hóa đơn: ${soLuong} x ${sanPham} = ${(soLuong * donGia).toLocaleString()} VNĐ`;

        console.log(hoaDon);

        /*Bài 0.5 - Toán tử số học */
        console.log("\nBÀI 0.5: TOÁN TỬ SỐ HỌC\n\n")

        let a = 15;
        let b = 4;

        console.log(`${a} + ${b} =`, a + b);    
        console.log(`${a} - ${b} =`, a - b);    
        console.log(`${a} * ${b} =`, a * b);    
        console.log(`${a} / ${b} =`, a / b);    
        console.log(`${a} % ${b} =`, a % b);    
        console.log(`${a} ** ${b} =`, a ** b);

        let x = 10;
        x += 5;   
        x -= 3;   
        x *= 2;   
        x /= 4;   
        console.log("x =", x);  

        let dem = 0;
        dem++;     
        dem++;     
        dem--;    
        console.log("dem =", dem);  

        /*
            Bài tập con 0.5 - Tính diện tích hình tròn
        */
        console.log("\nBài tập con 0.5 - Tính diện tích hình tròn\n\n")

        let banKinh = 5;

        let dienTich = PI * banKinh ** 2;
        let chuVi = 2 * PI * banKinh;

        console.log("Bán kính =", banKinh);
        console.log("Diện tích =", dienTich);
        console.log("Chu vi =", chuVi);

        /*Bài 0.6 - Toán tử so sánh*/
        console.log("\nBÀI 0.6: TOÁN TỬ SO SÁNH\n\n")

        console.log(5 == "5");      
        console.log(5 === "5");     
        console.log(true == 1);     
        console.log(true === 1);    

        console.log(10 > 5);        
        console.log(10 < 5);        
        console.log(10 >= 10);      
        console.log(10 <= 9);       
        console.log(10 != 5);       
        console.log(10 !== "10");   

        console.log(true && true);   
        console.log(true && false); 
        console.log(true || false);  
        console.log(false || false); 
        console.log(!true);         

        /*
            Bài tập con 0.6 - Kiểm tra điều kiện
        */
        console.log("\nBài tập con 0.6 - Kiểm tra điều kiện\n\n")
        
        let Diem = 7.5;
        let diemChuyenCan = 9;

        console.log("--- KẾT QUẢ ĐIỀU KIỆN ĐẠT ---");
        if(Diem >= 5 && diemChuyenCan >= 8)
            console.log("Đạt")
        else
            console.log("Không đạt")

        console.log("\n--- KẾT QUẢ XẾP LOẠI HỌC LỰC ---");
        if(Diem >= 8.5)
            console.log("Giỏi");
        else if(Diem >= 7)
            console.log("Khá");
        else if(Diem >= 5)
            console.log("Trung bình")
        else
            console.log("Yếu");
    
        
    </script>
</body>
</html>
